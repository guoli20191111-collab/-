<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾梦录 · 生成结果</title>
  <style>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'STSong', 'SimSun', serif;
      background: #08060f;
      color: rgba(255,240,210,0.9);
    }

    /* ── 导航栏 ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 68px;
      display: flex; align-items: center;
      padding: 0 48px;
      background: linear-gradient(to bottom, rgba(8,5,16,0.92) 0%, rgba(12,8,22,0.78) 100%);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    }
    .nav::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent 0%, rgba(200,160,100,0.15) 15%, rgba(200,160,100,0.45) 40%, rgba(220,180,120,0.55) 50%, rgba(200,160,100,0.45) 60%, rgba(200,160,100,0.15) 85%, transparent 100%);
    }
    .nav::before {
      content: ''; position: absolute; bottom: -3px; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(to right, transparent 0%, rgba(200,160,100,0.08) 20%, rgba(200,160,100,0.2) 50%, rgba(200,160,100,0.08) 80%, transparent 100%);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; margin-right: 36px; }
    .logo-img { height: 72px; width: auto; display: block; }
    .nav-center { position: relative; flex-shrink: 0; }
    .dropdown-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 0 22px; height: 36px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(200,160,100,0.3); border-radius: 6px;
      color: rgba(255,240,210,0.75); font-family: inherit; font-size: 15px; letter-spacing: 0.22em;
      cursor: pointer; transition: all 0.22s; white-space: nowrap;
    }
    .dropdown-btn:hover { background: rgba(200,160,100,0.1); border-color: rgba(200,160,100,0.65); color: rgba(255,240,210,1); }
    .dropdown-btn.open { background: rgba(200,160,100,0.12); border-color: rgba(220,180,120,0.8); color: #fff; border-radius: 6px 6px 0 0; }
    .dropdown-btn .btn-diamond { font-size: 7px; color: rgba(200,160,100,0.6); }
    .dropdown-btn:hover .btn-diamond, .dropdown-btn.open .btn-diamond { color: rgba(220,180,120,0.9); }
    .dropdown-btn .arrow { font-size: 8px; color: rgba(200,160,100,0.5); transition: transform 0.2s; margin-left: 2px; }
    .dropdown-btn.open .arrow { transform: rotate(180deg); color: rgba(220,180,120,0.8); }
    .dropdown-menu {
      position: absolute; top: 100%; left: 0; min-width: 100%;
      background: rgba(8,5,16,0.95); border: 1px solid rgba(200,160,100,0.35); border-top: none;
      border-radius: 0 0 6px 6px; backdrop-filter: blur(24px);
      overflow: hidden; opacity: 0; pointer-events: none;
      transform: translateY(-4px); transition: opacity 0.18s, transform 0.18s;
    }
    .dropdown-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .dropdown-item {
      display: flex; align-items: center; justify-content: center;
      padding: 11px 20px; font-size: 13px; letter-spacing: 0.22em;
      color: rgba(255,240,210,0.5); cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border-bottom: 1px solid rgba(200,160,100,0.1);
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { color: rgba(255,240,210,0.95); background: rgba(200,160,100,0.08); }
    .dropdown-item.on { color: rgba(255,240,210,0.95); }
    .dropdown-item.on::before { content: '◆'; margin-right: 8px; font-size: 5px; color: rgba(200,160,100,0.8); vertical-align: middle; }

    .nav-right {
      margin-left: auto; display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .nav-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid rgba(220,180,120,0.8);
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .nav-login-text { font-size: 13px; letter-spacing: 0.15em; color: rgba(200,160,100,0.7); white-space: nowrap; }

    /* ── 主布局 ── */
    .page { position: fixed; inset: 68px 0 0 0; display: flex; max-width: 1100px; margin: 0 auto; }

    /* 全屏模糊背景 */
    .page-blur-bg {
      position: absolute; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      filter: blur(24px) brightness(0.35); transform: scale(1.08);
    }

    /* 左侧图片 60% */
    .image-side { width: 55%; position: relative; overflow: hidden; cursor: pointer; z-index: 1; }
    .image-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .image-wrap img { max-height: 90%; max-width: 90%; width: auto; height: auto; object-fit: contain; position: relative; z-index: 1; }
    .image-side:hover .image-wrap img { transform: scale(1.015); transition: transform 0.4s ease; }

    /* 右侧面板 40% */
    .panel-side {
      width: 45%; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
      background: transparent;
      border-left: none;
      position: relative; z-index: 1;
    }
    .panel {
      width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 28px;
      background: rgba(8,6,15,0.55);
      border: 1px solid rgba(200,160,100,0.2);
      border-radius: 12px;
      padding: 40px 36px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .panel-eyebrow { font-size: 12px; font-weight: 300; color: rgba(200,160,100,0.55); letter-spacing: 0.4em; }
    .panel-title { font-size: 22px; font-weight: 300; color: rgba(255,240,210,0.95); letter-spacing: 0.12em; }
    .panel-title .gold { color: rgba(220,180,120,0.9); }

    .divider { height: 1px; background: linear-gradient(to right, transparent, rgba(200,160,100,0.3), transparent); }

    .info-row { display: flex; flex-direction: column; gap: 10px; }
    .info-item { display: flex; gap: 12px; align-items: baseline; }
    .info-label { font-size: 12px; color: rgba(200,160,100,0.5); letter-spacing: 0.2em; width: 40px; flex-shrink: 0; }
    .info-value { font-size: 15px; color: rgba(255,240,210,0.8); letter-spacing: 0.1em; }

    .question { font-size: 14px; color: rgba(200,160,100,0.6); letter-spacing: 0.2em; }

    .primary-btn {
      height: 52px;
      background: linear-gradient(135deg, rgba(200,160,100,0.22) 0%, rgba(180,120,80,0.18) 100%);
      border: 1px solid rgba(220,180,120,0.55); border-radius: 6px;
      color: rgba(255,240,210,0.95); font-family: inherit; font-size: 16px; letter-spacing: 0.35em;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .primary-btn:hover {
      background: linear-gradient(135deg, rgba(220,180,120,0.32) 0%, rgba(200,140,100,0.28) 100%);
      border-color: rgba(240,200,140,0.8); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,160,100,0.2);
    }
    .primary-btn .icon { font-size: 10px; color: rgba(220,180,120,0.8); }

    .sec-row { display: flex; gap: 12px; }
    .sec-btn {
      flex: 1; height: 44px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(200,160,100,0.25); border-radius: 6px;
      color: rgba(255,240,210,0.7); font-family: inherit; font-size: 14px; letter-spacing: 0.2em;
      cursor: pointer; transition: all 0.22s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .sec-btn:hover { background: rgba(200,160,100,0.1); border-color: rgba(200,160,100,0.5); color: rgba(255,240,210,0.95); }

    /* 全屏查看 */
    .fullscreen {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95);
      display: none; align-items: center; justify-content: center; cursor: pointer;
    }
    .fullscreen.active { display: flex; }
    .fullscreen img { max-width: 95%; max-height: 95%; object-fit: contain; }
    .fullscreen-close {
      position: absolute; top: 32px; right: 32px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(200,160,100,0.4);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,240,210,0.8); font-size: 24px; cursor: pointer; transition: all 0.25s;
    }
    .fullscreen-close:hover { background: rgba(200,160,100,0.2); transform: rotate(90deg); }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <img class="logo-img" src="assets/logo.png" alt="拾梦录" />
    </a>
    <div class="nav-center">
      <button class="dropdown-btn" id="dropBtn">
        <span class="btn-diamond">◆</span>
        <span id="dropLabel">IP剧集</span>
        <span class="arrow">▾</span>
      </button>
      <div class="dropdown-menu" id="dropMenu">
        <div class="dropdown-item" data-i="0">《逐风玉恋》</div>
      </div>
    </div>
    <div class="nav-right" id="navRight">
      <div class="nav-avatar">
        <span id="defaultIcon" style="font-size:20px;color:rgba(200,160,100,0.5);">👤</span>
        <img id="avatarImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;" />
      </div>
      <span class="nav-login-text" id="loginText">未登录</span>
    </div>
  </nav>

  <div class="page">
    <div class="page-blur-bg" id="blurBg"></div>
    <!-- 左侧图片 -->
    <div class="image-side" id="imageSide">
      <div class="image-wrap">
        <img id="mainImg" src="assets/bg.PNG" alt="古风形象" />
      </div>
    </div>

    <!-- 右侧面板 -->
    <div class="panel-side">
      <div class="panel">
        <div>
          <div class="panel-eyebrow">你的古风形象</div>
          <div style="height:8px;"></div>
          <div class="panel-title"><span class="gold">✦</span> 穿越成功 <span class="gold">✦</span></div>
        </div>

        <div class="divider"></div>

        <div class="info-row">
          <div class="info-item">
            <span class="info-label">角色</span>
            <span class="info-value" id="charName">小夭</span>
          </div>
          <div class="info-item">
            <span class="info-label">剧集</span>
            <span class="info-value" id="dramaName">《逐风玉恋》</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="question">满意这个结果吗？</div>

        <button class="primary-btn" id="continueBtn">
          <span class="icon">✦</span>
          <span>满意，生成同人文</span>
          <span class="icon">✦</span>
        </button>

        <div class="sec-row">
          <button class="sec-btn" id="retryBtn">↻ 重新生成</button>
          <button class="sec-btn" id="downloadBtn">↓ 下载</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 全屏查看 -->
  <div class="fullscreen" id="fullscreen">
    <div class="fullscreen-close" id="closeBtn">×</div>
    <img id="fullscreenImg" src="" alt="" />
  </div>

  <!-- 登录弹窗 -->
  <div id="loginModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div style="width:420px;background:rgba(8,5,16,0.97);border:1px solid rgba(200,160,100,0.4);border-radius:12px;padding:40px 36px;position:relative;font-family:'PingFang SC','Microsoft YaHei','STSong',serif;">
      <button onclick="document.getElementById('loginModal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(200,160,100,0.6);font-size:20px;cursor:pointer;">×</button>
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:13px;color:rgba(200,160,100,0.6);letter-spacing:0.3em;margin-bottom:8px;">拾梦录</div>
        <div style="font-size:20px;font-weight:300;color:rgba(255,240,210,0.95);letter-spacing:0.2em;">保存你的古风形象</div>
        <div style="font-size:13px;color:rgba(200,160,100,0.5);letter-spacing:0.15em;margin-top:6px;">开启专属故事</div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="display:flex;gap:0;margin-bottom:10px;">
          <input id="emailInput" type="email" placeholder="请输入邮箱地址" style="flex:1;height:46px;background:rgba(255,255,255,0.04);border:1px solid rgba(200,160,100,0.3);border-right:none;border-radius:6px 0 0 6px;color:rgba(255,240,210,0.9);font-family:inherit;font-size:14px;padding:0 14px;outline:none;" />
          <button id="codeBtn" onclick="sendCode()" style="width:110px;height:46px;background:rgba(200,160,100,0.12);border:1px solid rgba(200,160,100,0.3);border-radius:0 6px 6px 0;color:rgba(220,180,120,0.9);font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;">获取验证码</button>
        </div>
        <input id="codeInput" type="text" placeholder="请输入验证码" maxlength="6" style="width:100%;height:46px;background:rgba(255,255,255,0.04);border:1px solid rgba(200,160,100,0.3);border-radius:6px;color:rgba(255,240,210,0.9);font-family:inherit;font-size:14px;padding:0 14px;outline:none;" />
      </div>
      <div id="loginTip" style="font-size:12px;color:#e07070;letter-spacing:0.08em;margin-bottom:8px;min-height:18px;text-align:center;"></div>
      <button id="loginSubmitBtn" onclick="doLogin()" style="width:100%;height:50px;background:linear-gradient(135deg,rgba(200,160,100,0.25),rgba(180,120,80,0.2));border:1px solid rgba(220,180,120,0.6);border-radius:6px;color:rgba(255,240,210,0.95);font-family:inherit;font-size:16px;letter-spacing:0.35em;cursor:pointer;">✦ 登 录 ✦</button>
    </div>
  </div>

  <script>
    const dramas = ['《逐风玉恋》'];

    // 导航
    const idx = parseInt(localStorage.getItem('selectedDramaIndex') || '0');
    document.getElementById('dropLabel').textContent = dramas[idx] || dramas[0];
    document.querySelectorAll('.dropdown-item').forEach((el, i) => el.classList.toggle('on', i === idx));

    // 角色/剧集信息
    document.getElementById('charName').textContent = localStorage.getItem('selectedCharacterName') || '—';
    document.getElementById('dramaName').textContent = dramas[idx] || dramas[0];

    // 头像
    const isLoggedIn = !!(localStorage.getItem('userEmail') && localStorage.getItem('isLoggedIn'));
    const photo = localStorage.getItem('userPhoto');
    if (isLoggedIn) { document.getElementById('loginText').style.display = 'none'; }
    if (isLoggedIn && photo) {
      document.getElementById('avatarImg').src = photo;
      document.getElementById('avatarImg').style.display = 'block';
      document.getElementById('defaultIcon').style.display = 'none';
    }

    // 图片
    const genImg = localStorage.getItem('generatedImage') || 'assets/bg.PNG';
    document.getElementById('mainImg').src = genImg;
    document.getElementById('blurBg').style.backgroundImage = `url('${genImg}')`;
    document.getElementById('fullscreenImg').src = genImg;

    // 下拉
    const dropBtn = document.getElementById('dropBtn');
    const dropMenu = document.getElementById('dropMenu');
    dropBtn.addEventListener('click', e => { e.stopPropagation(); dropMenu.classList.toggle('open'); dropBtn.classList.toggle('open'); });
    document.addEventListener('click', () => { dropMenu.classList.remove('open'); dropBtn.classList.remove('open'); });
    document.querySelectorAll('.dropdown-item').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const i = +el.dataset.i;
        localStorage.setItem('selectedDramaIndex', i);
        localStorage.setItem('selectedDrama', JSON.stringify({ label: dramas[i] }));
        window.location.href = 'step2.html';
      });
    });

    // 未登录点击
    document.getElementById('navRight').addEventListener('click', () => {
      if (!isLoggedIn) document.getElementById('loginModal').style.display = 'flex';
    });

    // 全屏查看
    document.getElementById('imageSide').addEventListener('click', () => {
      document.getElementById('fullscreen').classList.add('active');
    });
    document.getElementById('fullscreen').addEventListener('click', e => {
      if (e.target !== document.querySelector('#fullscreen img')) document.getElementById('fullscreen').classList.remove('active');
    });
    document.getElementById('closeBtn').addEventListener('click', () => {
      document.getElementById('fullscreen').classList.remove('active');
    });

    // 满意继续 → 进入花名输入
    document.getElementById('continueBtn').addEventListener('click', () => {
      if (!isLoggedIn) {
        document.getElementById('loginModal').style.display = 'flex';
        return;
      }
      window.location.href = 'step5a.html';
    });

    // 重新生成
    document.getElementById('retryBtn').addEventListener('click', () => {
      window.location.href = 'step3.html';
    });

    // 下载 → 选择图片版本
    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.location.href = 'step4c.html';
    });

    // 登录
    function sendCode() {
      const phone = document.getElementById('phoneInput').value.trim();
      if (phone.length !== 11) { alert('请输入正确的手机号'); return; }
      const btn = document.getElementById('codeBtn');
      let t = 60; btn.disabled = true;
      const timer = setInterval(() => { t--; btn.textContent = t + 's后重发'; if (t <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '获取验证码'; } }, 1000);
    }
    function doLogin() {
      localStorage.setItem('isLoggedIn', 'true');
      document.getElementById('loginModal').style.display = 'none';
      location.reload();
    }
  </script>
<script>
    async function sendCode() {
      const email = document.getElementById("emailInput").value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById("loginTip").textContent = "请输入正确的邮箱地址"; return; }
      const btn = document.getElementById("codeBtn");
      btn.disabled = true; document.getElementById("loginTip").textContent = "";
      try {
        const r = await fetch("/api/send-email-code", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
        const d = await r.json();
        if (!r.ok) { document.getElementById("loginTip").textContent = d.error||"发送失败"; btn.disabled=false; return; }
        let t=60; btn.textContent=t+"s";
        const ti=setInterval(()=>{ t--; btn.textContent=t+"s"; if(t<=0){clearInterval(ti);btn.disabled=false;btn.textContent="获取验证码";}},1000);
      } catch(e){ document.getElementById("loginTip").textContent="网络错误"; btn.disabled=false; }
    }
    async function doLogin() {
      const email=document.getElementById("emailInput").value.trim();
      const code=document.getElementById("codeInput").value.trim();
      if(!email||!code){document.getElementById("loginTip").textContent="请填写邮箱和验证码";return;}
      const btn=document.getElementById("loginSubmitBtn");
      btn.disabled=true; btn.textContent="验证中";
      try {
        const r=await fetch("/api/verify-email-code",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,code})});
        const d=await r.json();
        if(!r.ok){document.getElementById("loginTip").textContent=d.error||"验证失败";btn.disabled=false;btn.innerHTML="&#10022; 登 录 &#10022;";return;}
        localStorage.setItem("isLoggedIn","true"); localStorage.setItem("userEmail",email);
        document.getElementById("loginModal").style.display="none";
      } catch(e){document.getElementById("loginTip").textContent="网络错误";btn.disabled=false;btn.innerHTML="&#10022; 登 录 &#10022;";}
    }
  </script>
</body>
</html>
